# Exercise 02 — Multi-Container Pod (Classic Sidecar) — Solution
apiVersion: v1
kind: Pod
metadata:
  name: app-with-sidecar
  namespace: exercise-02
spec:
  containers:
  - name: app
    image: busybox
    command: ["sh", "-c", "while true; do date >> /var/log/app.log; sleep 5; done"]
    volumeMounts:
    - name: logs
      mountPath: /var/log
  - name: log-agent
    image: busybox
    command: ["sh", "-c", "tail -f /var/log/app.log"]
    volumeMounts:
    - name: logs
      mountPath: /var/log
  volumes:
  - name: logs
    emptyDir: {}
---
# Bonus — Native Sidecar (v1.35)
apiVersion: v1
kind: Pod
metadata:
  name: app-with-native-sidecar
  namespace: exercise-02
spec:
  initContainers:
  - name: log-agent
    image: busybox
    restartPolicy: Always
    command: ["sh", "-c", "tail -f /var/log/app.log"]
    volumeMounts:
    - name: logs
      mountPath: /var/log
  containers:
  - name: app
    image: busybox
    command: ["sh", "-c", "while true; do date >> /var/log/app.log; sleep 5; done"]
    volumeMounts:
    - name: logs
      mountPath: /var/log
  volumes:
  - name: logs
    emptyDir: {}
